# Hotsplots captive portal handler
# ─────────────────────────────────────────────────────────────────────────────
# Hotsplots (hotsplots.net) is a portal platform used by many venues:
# restaurants, hotels, shopping centres and some public transport.
#
# Note on BayernWLAN: despite being operated by Vodafone in the background,
# BayernWLAN runs its own captive portal (wlan-bayern.de) and is NOT based
# on Hotsplots. A separate handler is needed for BayernWLAN — contributions
# welcome (see README).
#
# Credential-based portals: add entries to /etc/captive-credentials.conf:
#   HotspotsVenue   userpass   myuser   mypass

name: Hotsplots
priority: 20

match:
  - hotsplots

retry_delays: [2, 3, 5, 5]

steps:
  - label:       login
    action:      from_form
    fields:      from_form
    check_boxes: true   # tick T&C checkbox for free portals
