# Hotsplots / BayernWLAN captive portal handler
# ─────────────────────────────────────────────────────────────────────────────
# Hotsplots (hotsplots.net) is the portal platform used by BayernWLAN and
# many other venues (restaurants, hotels, public transport).
#
# BayernWLAN note: although Vodafone operates BayernWLAN in the background,
# the captive portal itself runs on Hotsplots — NOT on Vodafone's own portal.
# This handler covers both. vodafone.yaml only applies to Vodafone's own
# commercial hotspots (VodafoneWifi* SSIDs) which require credentials.
#
# Free portals (BayernWLAN, many venues): no credentials needed — the form
# just has a checkbox to accept T&C. check_boxes: true handles that.
# Credential-based portals: add entries to /etc/captive-credentials.conf:
#   BayernWLAN*   free
#   HotspotsVenue userpass  myuser  mypass

name: Hotsplots / BayernWLAN
priority: 20

match:
  - hotsplots
  - bayernwlan
  - brombachsee-wifi

retry_delays: [2, 3, 5, 5]

steps:
  - label:       login
    action:      from_form
    fields:      from_form
    check_boxes: true   # tick T&C checkbox for free portals
