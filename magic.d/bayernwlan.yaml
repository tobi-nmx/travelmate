# BayernWLAN captive portal handler
# ─────────────────────────────────────────────────────────────────────────────
# BayernWLAN (@BayernWLAN) is a free public WiFi network across Bavaria,
# operated by Vodafone on behalf of the Bavarian state government.
# No registration or credentials required — just accept the T&C.
#
# Portal URL: https://hotspot.vodafone.de/bayern/
# SSID:       @BayernWLAN
#
# The portal is a single-page form with a T&C checkbox.

name: BayernWLAN
priority: 15

match:
  - hotspot.vodafone.de/bayern
  - bayernwlan
  - brombachsee-wifi

retry_delays: [2, 3, 5, 5]

steps:
  - label:       login
    action:      from_form
    fields:      from_form
    check_boxes: true   # accept T&C checkbox — no credentials needed
