# Vodafone Hotspot handler
# ─────────────────────────────────────────────────────────────────────────────
# Vodafone public hotspots. Add credentials to /etc/captive-credentials.conf:
#   VodafoneWifi*   userpass   myuser   mypassword

name: Vodafone Hotspot
priority: 20

match:
  - vodafone

retry_delays: [2, 3, 5, 5]

steps:
  - label:  login
    action: from_form
    fields: from_form

